# packages/core.yaml

logger:
  level: DEBUG
  logs:
    uart: DEBUG
    tclac: DEBUG
    climate: DEBUG
    sensor: DEBUG
    switch: DEBUG
    select: DEBUG
    wifi: WARN
    api: WARN

uart:
  id: uart_bus
  tx_pin: ${uart_tx}
  rx_pin: ${uart_rx}
  baud_rate: 9600
  parity: EVEN
  stop_bits: 1
  data_bits: 8
  # Отладка UART поможет увидеть сырые данные, если будут проблемы
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      timeout: 50ms

external_components:
  - source:
      type: github
      repo: linkevich-vladimir/tclac
      ref: master
    components: [tclac]
    refresh: 30s

climate:
  - platform: tclac
    id: tclac_component
    name: "${humanly_name}"
    update_interval: 5s
    visual:
      min_temperature: 16
      max_temperature: 32
      temperature_step: 1.0
    supported_modes:
      - OFF
      - COOL
      - HEAT
      - DRY
      - FAN_ONLY
    custom_fan_modes:
      - "Auto"
      - "Low"
      - "Medium-Low"
      - "Medium"
      - "Medium-High"
      - "High"

