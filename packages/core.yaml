# packages/core.yaml
# Этот файл подключает компонент tclac из репозитория GitHub и настраивает базовые параметры

# Подключаем компонент напрямую из этого же репозитория
external_components:
  - source:
      type: github
      repo: linkevich-vladimir/tclac
      ref: master
      files: [tclac]
    components: [tclac]
    refresh: 30s

esphome:
  on_boot:
    priority: 600
    then:
      - lambda: |-
          // Инициализация при старте, если нужно
          // id(tclac_component)->takeControl();

logger:
  level: DEBUG
  logs:
    uart: DEBUG
    tclac: DEBUG
    climate: DEBUG
    sensor: DEBUG
    switch: DEBUG
    select: DEBUG
    wifi: WARN
    api: WARN

uart:
  id: uart_bus
  tx_pin: ${uart_tx}
  rx_pin: ${uart_rx}
  baud_rate: 9600
  parity: EVEN
  stop_bits: 1
  data_bits: 8
  # Отладка UART поможет видеть сырые данные, если будут проблемы
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      timeout: 50ms

climate:
  - platform: tclac
    id: tclac_component
    name: "${humanly_name}"
    update_interval: 5s
    visual:
      min_temperature: 16
      max_temperature: 32
      temperature_step: 1.0
    supported_modes:
      - OFF
      - COOL
      - HEAT
      - DRY
      - FAN_ONLY
    custom_fan_modes:
      - "Auto"
      - "Low"
      - "Medium-Low"
      - "Medium"
      - "Medium-High"
      - "High"

# Дополнительные переключатели и селекты для расширенного управления
switch:
  - platform: template
    id: beeper_switch
    name: "Beeper"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          if (id(tclac_component).has_state()) {
             // Здесь должна быть логика отправки команды, если она реализована в компоненте
             ESP_LOGD("switch", "Beeper toggle requested");
          }
    turn_off_action:
      - lambda: |-
          ESP_LOGD("switch", "Beeper off requested");

  - platform: template
    id: display_switch
    name: "Display"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          ESP_LOGD("switch", "Display on requested");
    turn_off_action:
      - lambda: |-
          ESP_LOGD("switch", "Display off requested");

select:
  - platform: template
    id: vertical_swing
    name: "Vertical swing"
    options:
      - "Off"
      - "Manual"
      - "Swing"
    optimistic: true
    restore_value: true
    initial_option: "Swing"
    set_action:
      - lambda: |-
          ESP_LOGD("select", "Vertical swing set to %s", x.c_str());

  - platform: template
    id: horizontal_swing
    name: "Horizontal swing"
    options:
      - "Off"
      - "Manual"
      - "Swing"
    optimistic: true
    restore_value: true
    initial_option: "Swing"
    set_action:
      - lambda: |-
          ESP_LOGD("select", "Horizontal swing set to %s", x.c_str());

sensor:
  - platform: internal
    id: ac_internal_temp
    name: "AC Internal Temp Raw"
    entity_category: diagnostic
    disabled_by_default: true
