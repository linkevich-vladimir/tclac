# packages/core.yaml
# Этот файл подключает компонент tclac из репозитория и настраивает базовые параметры

esphome:
  on_boot:
    priority: 600
    then:
      - lambda: |-
          id(tclac_component)->takeControl();

external_components:
  - source:
      type: github
      repo: linkevich-vladimir/tclac
      ref: master
      # Путь внутри репозитория, где лежит папка components
      # Обычно это корень, если папка components лежит прямо в репозитории
      # Если у вас структура такая: репозиторий/components/tclac, то files не нужен или путь выше
      # Для структуры: репозиторий/components/tclac -> используем path или files
      # Правильный вариант для ESPHome, когда компоненты в папке components в корне репо:
      path: components 
    components: [tclac]
    refresh: 30s

logger:
  level: DEBUG
  logs:
    uart: DEBUG
    tclac: DEBUG
    climate: DEBUG
    sensor: DEBUG
    switch: DEBUG
    select: DEBUG
    wifi: WARN
    api: WARN

uart:
  id: uart_bus
  tx_pin: ${uart_tx}
  rx_pin: ${uart_rx}
  baud_rate: 9600
  parity: EVEN
  stop_bits: 1
  data_bits: 8
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      timeout: 50ms

climate:
  - platform: tclac
    id: tclac_component
    name: "${humanly_name}"
    update_interval: 5s
    visual:
      min_temperature: 16
      max_temperature: 32
      temperature_step: 1.0
    supported_modes:
      - OFF
      - COOL
      - HEAT
      - DRY
      - FAN_ONLY
    custom_fan_modes:
      - "Auto"
      - "Low"
      - "Medium-Low"
      - "Medium"
      - "Medium-High"
      - "High"

# Дополнительные переключатели и селекты для расширенного управления
switch:
  - platform: template
    id: beeper_switch
    name: "Beeper"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          id(tclac_component)->set_beeper(true);
    turn_off_action:
      - lambda: |-
          id(tclac_component)->set_beeper(false);

  - platform: template
    id: display_switch
    name: "Display"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          id(tclac_component)->set_display(true);
    turn_off_action:
      - lambda: |-
          id(tclac_component)->set_display(false);

select:
  - platform: template
    id: vertical_swing
    name: "Vertical swing"
    options:
      - "Off"
      - "Manual"
      - "Swing"
    optimistic: true
    restore_value: true
    initial_option: "Swing"
    set_action:
      - lambda: |-
          id(tclac_component)->set_vertical_swing(x);

  - platform: template
    id: horizontal_swing
    name: "Horizontal swing"
    options:
      - "Off"
      - "Manual"
      - "Swing"
    optimistic: true
    restore_value: true
    initial_option: "Swing"
    set_action:
      - lambda: |-
          id(tclac_component)->set_horizontal_swing(x);

sensor:
  - platform: internal
    id: ac_internal_temp
    name: "AC Internal Temp Raw"
    entity_category: diagnostic
    disabled_by_default: true
