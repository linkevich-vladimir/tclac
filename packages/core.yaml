# packages/core.yaml

# Подключаем компонент tclac прямо из этого репозитория
external_components:
  - source:
      type: github
      repo: linkevich-vladimir/tclac
      ref: master
      # Путь внутри репозитория, где лежит папка с компонентами
      path: components
    components:
      - tclac
    refresh: 30s

logger:
  level: DEBUG
  logs:
    uart: DEBUG
    tclac: DEBUG
    climate: DEBUG
    sensor: DEBUG
    switch: DEBUG
    select: DEBUG
    wifi: WARN
    api: WARN
    esp32.preferences: WARN

uart:
  id: uart_bus
  tx_pin: ${uart_tx}
  rx_pin: ${uart_rx}
  baud_rate: 9600
  parity: EVEN
  stop_bits: 1
  data_bits: 8
  # Отладка UART (можно включить для детального просмотра байт)
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      timeout: 50ms

climate:
  - platform: tclac
    id: tclac_component
    name: "${humanly_name}"
    update_interval: 5s
    visual:
      min_temperature: 16
      max_temperature: 32
      temperature_step: 1.0
    supported_modes:
      - OFF
      - COOL
      - HEAT
      - DRY
      - FAN_ONLY
    custom_fan_modes:
      - "Auto"
      - "Low"
      - "Medium-Low"
      - "Medium"
      - "Medium-High"
      - "High"

# Дополнительные переключатели (опционально)
switch:
  - platform: template
    id: beeper_switch
    name: "Beeper"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    # Действия будут добавлены, когда методы появятся в C++ классе
    turn_on_action:
      - lambda: |-
          ESP_LOGD("main", "Beeper ON requested");
    turn_off_action:
      - lambda: |-
          ESP_LOGD("main", "Beeper OFF requested");

  - platform: template
    id: display_switch
    name: "Display"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          ESP_LOGD("main", "Display ON requested");
    turn_off_action:
      - lambda: |-
          ESP_LOGD("main", "Display OFF requested");

select:
  - platform: template
    id: vertical_swing
    name: "Vertical swing"
    options:
      - "Off"
      - "Manual"
      - "Swing"
    optimistic: true
    restore_value: true
    initial_option: "Swing"
    set_action:
      - lambda: |-
          ESP_LOGD("main", "Vertical swing set to %s", x.c_str());

  - platform: template
    id: horizontal_swing
    name: "Horizontal swing"
    options:
      - "Off"
      - "Manual"
      - "Swing"
    optimistic: true
    restore_value: true
    initial_option: "Swing"
    set_action:
      - lambda: |-
          ESP_LOGD("main", "Horizontal swing set to %s", x.c_str());
